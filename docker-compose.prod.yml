services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-engagium}
      POSTGRES_USER: ${POSTGRES_USER:-engagium_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-engagium_user} -d ${POSTGRES_DB:-engagium}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: https://engagium.app
      CORS_ORIGIN: https://engagium.app,https://www.engagium.app
      TRUST_PROXY: "1"
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX: "600"
      DB_POOL_MAX: "40"
      DB_IDLE_TIMEOUT_MS: "30000"
      DB_CONNECTION_TIMEOUT_MS: "3000"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-engagium}
      DB_USER: ${POSTGRES_USER:-engagium_user}
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      SESSION_SECRET_FILE: /run/secrets/session_secret
      SMTP_USER_FILE: /run/secrets/smtp_user
      SMTP_PASS_FILE: /run/secrets/smtp_pass
    secrets:
      - db_password
      - jwt_secret
      - jwt_refresh_secret
      - session_secret
      - smtp_user
      - smtp_pass

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "127.0.0.1:${NGINX_PORT:-8890}:80"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

secrets:
  db_password:
    file: ./.secrets/db_password
  jwt_secret:
    file: ./.secrets/jwt_secret
  jwt_refresh_secret:
    file: ./.secrets/jwt_refresh_secret
  session_secret:
    file: ./.secrets/session_secret
  smtp_user:
    file: ./.secrets/smtp_user
  smtp_pass:
    file: ./.secrets/smtp_pass
