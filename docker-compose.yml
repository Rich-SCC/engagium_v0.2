services:
  db:
    image: postgres:15
    container_name: engagium-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-engagium}
      POSTGRES_USER: ${POSTGRES_USER:-engagium_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-engagium_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-engagium_user} -d ${POSTGRES_DB:-engagium}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: engagium-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-engagium}
      DB_USER: ${POSTGRES_USER:-engagium_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-engagium_password}
    volumes:
      - ./backend:/app
      - type: volume
        source: backend_node_modules
        target: /app/node_modules
        volume:
          nocopy: true
    command: sh -c "if [ ! -d node_modules/.bin ]; then npm ci; fi && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: engagium-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${NGINX_PORT:-8888}/api}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - type: volume
        source: frontend_node_modules
        target: /app/node_modules
        volume:
          nocopy: true
    command: sh -c "if [ ! -d node_modules/.bin ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 5173"

  nginx:
    image: nginx:1.27-alpine
    container_name: engagium-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_PORT:-8888}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
