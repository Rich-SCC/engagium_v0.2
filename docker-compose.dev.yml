services:
  db:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-engagium}
      POSTGRES_USER: ${POSTGRES_USER:-engagium_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-engagium_user} -d ${POSTGRES_DB:-engagium}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-engagium}
      DB_USER: ${POSTGRES_USER:-engagium_user}
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      SESSION_SECRET_FILE: /run/secrets/session_secret
      SMTP_USER_FILE: /run/secrets/smtp_user
      SMTP_PASS_FILE: /run/secrets/smtp_pass
    volumes:
      - ./backend:/app
      - type: volume
        source: backend_node_modules
        target: /app/node_modules
        volume:
          nocopy: true
    command: sh -c "if [ ! -d node_modules/.bin ]; then npm ci; fi && npm run dev"
    secrets:
      - db_password
      - jwt_secret
      - jwt_refresh_secret
      - session_secret
      - smtp_user
      - smtp_pass

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - type: volume
        source: frontend_node_modules
        target: /app/node_modules
        volume:
          nocopy: true
    command: sh -c "if [ ! -d node_modules/.bin ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 5173"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "127.0.0.1:${NGINX_PORT:-8888}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

secrets:
  db_password:
    file: ./.secrets/db_password
  jwt_secret:
    file: ./.secrets/jwt_secret
  jwt_refresh_secret:
    file: ./.secrets/jwt_refresh_secret
  session_secret:
    file: ./.secrets/session_secret
  smtp_user:
    file: ./.secrets/smtp_user
  smtp_pass:
    file: ./.secrets/smtp_pass
